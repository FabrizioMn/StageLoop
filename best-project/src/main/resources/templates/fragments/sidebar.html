<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">

<div th:fragment="sidebar">

    <div class="d-flex flex-column flex-shrink-0 p-3 text-bg-dark vh-100" style="width: 280px">
        
        <a th:href="@{/dashboard}" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <i class="bi bi-shield-lock-fill fs-4 me-2"></i>
            <span class="fs-4 fw-bold">Admin Panel</span>
        </a>
        
        <hr />
        
        <ul class="nav nav-pills flex-column mb-auto">
            
            <li class="nav-item">
                <a th:href="@{/}" class="nav-link text-white">
                    <i class="bi bi-house-door-fill me-2"></i> Ir al Sitio Web
                </a>
            </li>
            
            <li>
                <a th:href="@{/dashboard}" class="nav-link text-white"
                   th:classappend="${activePage == '/dashboard'} ? 'active' : ''">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
            </li>
            
            <li sec:authorize="hasRole('Administrador')">
                <a th:href="@{/events}" class="nav-link text-white" 
                   th:classappend="${activePage == '/events'} ? 'active' : ''">
                    <i class="bi bi-calendar-event me-2"></i> Eventos
                </a>
            </li>

            <li sec:authorize="hasAnyRole('Administrador', 'Personal')">
                <a th:href="@{/orders}" class="nav-link text-white" 
                th:classappend="${activePage == '/orders'} ? 'active' : ''">
                    <i class="bi bi-receipt me-2"></i> Órdenes
                </a>
            </li>
            
            <li sec:authorize="hasRole('Administrador')">
                <a th:href="@{/organizers}" class="nav-link text-white" 
                   th:classappend="${activePage == '/organizers'} ? 'active' : ''">
                    <i class="bi bi-people-fill me-2"></i> Organizadores
                </a>
            </li>

            <li sec:authorize="hasAnyRole('Administrador', 'Personal')">
                <a th:href="@{/requests}" class="nav-link text-white" 
                   th:classappend="${activePage == '/requests'} ? 'active' : ''">
                    <i class="bi bi-inbox-fill me-2"></i> Solicitudes
                    <span class="badge bg-danger ms-2 rounded-pill">!</span>
                </a>
            </li>
            
        </ul>
        
        <hr />
        
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
               data-bs-toggle="dropdown" aria-expanded="false">
                <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="" width="32" height="32" class="rounded-circle me-2" />
                
                <strong sec:authentication="name">Usuario</strong>
            </a>
            
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
                <li><a class="dropdown-item" href="#">Configuración</a></li>
                <li><a class="dropdown-item" href="#">Perfil</a></li>
                <li><hr class="dropdown-divider" /></li>
                
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button class="dropdown-item text-danger" type="submit">
                            <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>

    <style>
       @import url("https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css");
    </style>
</div>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" th:href="@{/css/estilos.css}">
<body>

<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-white shadow-sm" style="background-color: #ffffff;">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/}">StageLoop</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto d-flex gap-3 align-items-center">
            <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/explorar}">Explorar</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/solicitar-evento}">Crea tu evento</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/nosotros}">Nosotros</a></li>
          </ul>

          <div class="d-flex ms-3 align-items-center">
            <form class="d-flex me-3" role="search">
               <input class="form-control me-2 form-control-sm" type="search" placeholder="Buscar..." aria-label="Search" style="width: 150px;">
            </form>

            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="btn btn-outline-primary">Login</a>
                <a th:href="@{/register}" class="btn btn-primary ms-2">Registro</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="dropdown">
                <button class="btn btn-light dropdown-toggle d-flex align-items-center gap-2 border" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle text-primary fs-5"></i>
                    <span class="fw-bold text-dark" sec:authentication="name">Usuario</span>
                </button>
                
                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li><h6 class="dropdown-header">Mi Cuenta</h6></li>
                    <li><a class="dropdown-item" th:href="@{/mis-compras}">Mis Compras</a></li>

                    <li sec:authorize="hasRole('Organizador')">
                      <a class="dropdown-item" th:href="@{/mis-eventos}">Gestionar mis Eventos</a>
                  </li>
                    
                    <li sec:authorize="hasAnyRole('Administrador','Personal')">
                        <a class="dropdown-item text-primary fw-bold" th:href="@{/dashboard}">
                            <i class="bi bi-speedometer2"></i> Panel Admin
                        </a>
                    </li>
                    
                    <li><hr class="dropdown-divider"></li>
                    
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button class="dropdown-item text-danger" type="submit">
                                <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                            </button>
                        </form>
                    </li>
                </ul>
            </div>

          </div>
        </div>
      </div>
    </nav>
  </div>

  <div th:fragment="footer">
    <footer class="footer-elegante py-5 mt-5"> 
      <div class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between py-4 my-4">
          <p>&copy; 2025 Grupo#4 - StageLoop.</p>
          <ul class="list-unstyled d-flex gap-3">
            <li><a href="#">Instagram</a></li>
            <li><a href="#">Facebook</a></li>
            <li><a href="#">Términos</a></li>
          </ul>
        </div>
      </div>
    </footer>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>StageLoop - Inicio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="icon" th:href="@{/logo.ico}" type="image/x-icon" />
  <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/general :: navbar}"></div>

<header>
    <div class="container marketing py-5">
        <div class="row justify-content-center">
            <div class="col-12">
                <div id="carouselExample" class="carousel slide shadow-lg mb-5" style="border-radius: 20px; overflow: hidden;">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img th:src="@{/img/img_Carrusel1.webp}" class="d-block w-100" style="height: 400px; object-fit: cover;" />
                            <div class="carousel-caption d-none d-md-block"><h5>Eventos Exclusivos</h5></div>
                        </div>
                        <div class="carousel-item">
                            <img th:src="@{/img/img_Carrusel2.jpg}" class="d-block w-100" style="height: 400px; object-fit: cover;" />
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="flex-grow-1">
  <div class="container marketing py-5">
    <div class="row g-4">
      
      <div th:each="evento : ${eventos}" class="col-md-6 col-lg-3">
        <div class="card h-100 shadow-sm border-1 hover-shadow">
          <div class="card-img-container" style="height: 200px; overflow: hidden;">
            
            <img th:if="${evento.imagen != null}"
                 th:src="@{'/imagen/ver/' + ${evento.idEvento}}" 
                 class="card-img-top h-100 w-100"
                 style="object-fit: cover; transition: transform 0.3s ease;" 
                 onmouseover="this.style.transform='scale(1.05)'" 
                 onmouseout="this.style.transform='scale(1)'" />
                 
            <img th:if="${evento.imagen == null}"
                 src="https://picsum.photos/400/200?grayscale"
                 class="card-img-top h-100 w-100"
                 style="object-fit: cover;" />
          </div>

          <div class="card-body d-flex flex-column text-center">
            <h5 class="card-title fw-bold text-dark text-truncate">
              <span th:text="${evento.titulo}">Título</span>
            </h5>

            <div class="evento-info small text-muted mb-2">
               <div class="d-flex justify-content-center gap-2"><i class="bi bi-calendar-event"></i> <span th:text="${evento.fechaEvento}"></span></div>
               <div class="d-flex justify-content-center gap-2"><i class="bi bi-geo-alt"></i> <span th:text="${evento.lugarEvento}"></span></div>
               <div class="fw-bold text-primary mt-2">S/ <span th:text="${evento.precio}"></span></div>
            </div>

            <a th:href="@{'/checkout/' + ${evento.idEvento}}" class="btn btn-outline-primary mt-auto fw-semibold py-2">
              Comprar
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<div th:replace="~{fragments/general :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

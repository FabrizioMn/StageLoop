<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Crear tu evento - StageLoop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" th:href="@{/logo.ico}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/general :: navbar}"></div>

    <main class="flex-grow-1">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-dark text-white p-4">
                            <h3 class="mb-0">📝 Solicitar Nuevo Evento</h3>
                        </div>
                        <div class="card-body p-4">

                            <form th:action="@{/solicitar-evento}" th:object="${evento}" method="post" enctype="multipart/form-data">

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Título</label>
                                    <input type="text" th:field="*{titulo}" class="form-control" 
                                           th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid' : ''" placeholder="Ej: Concierto" />
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Descripción</label>
                                    <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Fecha</label>
                                        <input type="date" th:field="*{fechaEvento}" class="form-control" />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Inicio</label>
                                        <input type="time" th:field="*{horaInicio}" class="form-control" />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Fin</label>
                                        <input type="time" th:field="*{horaFin}" class="form-control" />
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Lugar</label>
                                    <input type="text" th:field="*{lugarEvento}" class="form-control" />
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Precio (S/)</label>
                                        <input type="number" th:field="*{precio}" class="form-control" step="0.01" />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Aforo</label>
                                        <input type="number" th:field="*{capacidad}" class="form-control" />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Categoría</label>
                                        <select th:field="*{categoria.idCategoria}" class="form-select">
                                            <option value="">Seleccionar...</option>
                                            <option th:each="cat : ${categorias}" th:value="${cat.idCategoria}" th:text="${cat.nombreCategoria}"></option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="archivoImagen" class="form-label fw-bold text-primary">Imagen del Evento</label>
                                    <input type="file" name="archivoImagen" id="archivoImagen" class="form-control" accept="image/*" required />
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">Enviar Solicitud</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/general :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

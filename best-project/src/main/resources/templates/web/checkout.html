<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - StageLoop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/general :: navbar}"></div>

    <main class="flex-grow-1">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    
                    <div th:if="${param.error}" class="alert alert-danger shadow-sm">
                        <i class="bi bi-exclamation-circle-fill me-2"></i>
                        <span th:text="${param.error}"></span>
                    </div>

                    <div class="card shadow border-0 rounded-4 overflow-hidden">
                        <div class="card-header bg-dark text-white text-center py-4">
                            <h4 class="mb-0 fw-bold">🎟️ Resumen de Compra</h4>
                        </div>
                        
                        <div class="card-body p-5">
                            
                            <div class="text-center mb-4">
                                <h3 class="fw-bold text-primary" th:text="${evento.titulo}">Nombre Evento</h3>
                                <p class="text-muted mb-1" th:text="${evento.lugarEvento}">Ubicación</p>
                                <span class="badge bg-warning text-dark">
                                    Quedan <span th:text="${evento.capacidad}"></span> entradas
                                </span>
                            </div>

                            <hr class="my-4">

                            <form th:action="@{/checkout/procesar}" method="post">
                                <input type="hidden" name="idEvento" th:value="${evento.idEvento}">

                                <div class="mb-4">
                                    <label class="form-label fw-bold">Selecciona cantidad:</label>
                                    <select name="cantidad" id="cantidad" class="form-select form-select-lg" onchange="calcularTotal()">
                                        <option value="1">1 entrada</option>
                                        <option value="2">2 entradas</option>
                                        <option value="3">3 entradas</option>
                                        <option value="4">4 entradas</option>
                                        <option value="5">5 entradas</option>
                                    </select>
                                </div>

                                <div class="bg-light p-3 rounded mb-4 border">
                                    <div class="d-flex justify-content-between mb-2">
                                        <span>Precio Unitario:</span>
                                        <span>S/ <span id="precioUnitario" th:text="${evento.precio}"></span></span>
                                    </div>
                                    <div class="d-flex justify-content-between fw-bold fs-4 text-success border-top pt-2">
                                        <span>Total a Pagar:</span>
                                        <span>S/ <span id="totalDisplay" th:text="${evento.precio}"></span></span>
                                    </div>
                                </div>

                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary btn-lg shadow-sm fw-bold">
                                        Confirmar Pago
                                    </button>
                                    <a th:href="@{/explorar}" class="btn btn-outline-secondary">Cancelar</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/general :: footer}"></div>

    <script>
        function calcularTotal() {
            let precio = parseFloat(document.getElementById('precioUnitario').innerText);
            let cantidad = parseInt(document.getElementById('cantidad').value);
            let total = (precio * cantidad).toFixed(2);
            document.getElementById('totalDisplay').innerText = total;
        }
    </script>

</body>
</html>

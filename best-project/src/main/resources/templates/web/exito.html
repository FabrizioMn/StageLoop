<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>¡Gracias! - StageLoop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/general :: navbar}"></div>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="text-center p-5">
            <div class="mb-4 text-success">
                <i class="bi bi-check-circle-fill" style="font-size: 5rem;"></i>
            </div>
            
            <h1 class="fw-bold mb-3">¡Compra Exitosa!</h1>
            <p class="lead text-muted mb-5">Gracias por confiar en StageLoop.<br>Tus entradas han sido reservadas.</p>
            
            <div class="d-flex justify-content-center gap-3">
                <a th:href="@{/explorar}" class="btn btn-outline-secondary px-4">Seguir comprando</a>
                <a th:href="@{/mis-compras}" class="btn btn-primary px-4">Ver mis entradas</a>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/general :: footer}"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

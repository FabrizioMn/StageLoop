<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Mis Eventos - StageLoop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/general :: navbar}"></div>

    <main class="flex-grow-1 container py-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h2 class="fw-bold text-dark">
                <i class="bi bi-calendar-check-fill text-primary me-2"></i> Mis Eventos Publicados
            </h2>
        </div>

        <div th:if="${eventos.isEmpty()}" class="text-center py-5">
            <div class="mb-3 text-muted">
                <i class="bi bi-calendar-x" style="font-size: 4rem;"></i>
            </div>
            <h4>No has organizado ningún evento aún.</h4>
            <p class="text-muted">¡Anímate a crear el primero!</p>
        </div>

        <div th:unless="${eventos.isEmpty()}" class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-dark text-white">
                        <tr>
                            <th class="ps-4">Evento</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th>Entradas Restantes</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="evento : ${eventos}">
                            <td class="ps-4">
                                <div class="fw-bold text-primary" th:text="${evento.titulo}">Título</div>
                                <small class="text-muted" th:text="${evento.categoria.nombreCategoria}">Cat</small>
                            </td>
                            
                            <td>
                                <i class="bi bi-calendar3 me-1 text-muted"></i>
                                <span th:text="${evento.fechaEvento}">2025-01-01</span>
                            </td>
                            
                            <td>
                                <span class="badge rounded-pill"
                                      th:classappend="${evento.estado == 'Activo' ? 'bg-success' : (evento.estado == 'Pendiente' ? 'bg-warning text-dark' : 'bg-danger')}"
                                      th:text="${evento.estado}">
                                    Activo
                                </span>
                            </td>
                            
                            <td>
                                <span class="fw-bold" th:text="${evento.capacidad}">100</span>
                            </td>
                            
                            <td class="text-end pe-4">
                                <a th:href="@{'/checkout/' + ${evento.idEvento}}" class="btn btn-sm btn-outline-primary" title="Ver como cliente">
                                    <i class="bi bi-eye"></i>
                                </a>
                                
                                <button class="btn btn-sm btn-outline-secondary" disabled title="Edición disponible pronto">
                                    <i class="bi bi-pencil"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/general :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

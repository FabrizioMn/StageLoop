<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content" class="container-fluid mt-4">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Historial de Transacciones</h2>
        <button class="btn btn-outline-secondary btn-sm" onclick="window.print()">
            <i class="bi bi-printer"></i> Imprimir Reporte
        </button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">ID Orden</th>
                            <th>Cliente</th>
                            <th>Fecha</th>
                            <th>Eventos Comprados</th>
                            <th>Total</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="orden : ${ordenes}">
                            <td class="ps-4 fw-bold">#<span th:text="${orden.idOrden}"></span></td>
                            
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle p-2 me-2">
                                        <i class="bi bi-person-fill"></i>
                                    </div>
                                    <div>
                                        <div class="fw-bold" th:text="${orden.usuario.nombre}">Nombre</div>
                                        <div class="small text-muted" th:text="${orden.usuario.email}">Email</div>
                                    </div>
                                </div>
                            </td>

                            <td>
                                <i class="bi bi-calendar3 me-1 text-muted"></i>
                                <span th:text="${#temporals.format(orden.fechaOrden, 'dd/MM/yyyy HH:mm')}"></span>
                            </td>

                            <td>
                                <ul class="list-unstyled mb-0 small">
                                    <li th:each="detalle : ${orden.detalles}">
                                        <span class="badge bg-secondary me-1" th:text="${detalle.cantidad}">1</span>
                                        <span th:text="${detalle.evento.titulo}">Evento</span>
                                    </li>
                                </ul>
                            </td>

                            <td class="fw-bold text-success">
                                S/ <span th:text="${orden.total}">0.00</span>
                            </td>

                            <td class="text-end pe-4">
                                <a href="#" class="btn btn-sm btn-light text-primary" title="Ver Detalle">
                                    <i class="bi bi-eye-fill"></i>
                                </a>
                                <a th:href="@{/orders/delete/{id}(id=${orden.idOrden})}" onclick="return confirm('Estas seguro de eliminar esta orden?')" class="btn btn-sm btn-light text-danger" title="Eliminar Registro">
                                    <i class="bi bi-trash-fill"></i>
                                </a>
                            </td>
                        </tr>

                        <tr th:if="${ordenes.isEmpty()}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                No hay órdenes registradas aún.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</html>
